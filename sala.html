<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Voz en Vivo</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .btn { background-color: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background-color: #218838; }
        .btn.mutear { background-color: #dc3545; }
        .btn.mutear:hover { background-color: #c82333; }
        #status { margin-top: 20px; color: #aaa; }
        .usuarios-lista { margin-top: 30px; display: flex; justify-content: center; gap: 10px; }
        .usuario-burbuja { background: #333; padding: 10px 20px; border-radius: 20px; border: 1px solid #555; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

    <h1>🎙️ Sala de Voz Colectiva</h1>
    <p>Todos los que entren a esta página podrán hablar escucharse entre sí.</p>

    <button id="btn-microfono" class="btn">Activar Micrófono e Entrar</button>
    <div id="status">Desconectado - Haz clic en el botón para iniciar</div>

    <div class="usuarios-lista" id="usuarios">
        </div>

    <div id="audios-contenedor" style="display:none;"></div>

<script>
    const btnMicrofono = document.getElementById('btn-microfono');
    const statusDiv = document.getElementById('status');
    const audiosContenedor = document.getElementById('audios-contenedor');

    let miStreamLocal = null;
    let peer = null;
    
    // ⚠️ ID fijo para la sala. Todos los que usen el mismo prefijo se conectarán juntos.
    const SALA_ID = "quiniela360_sala_global"; 

    btnMicrofono.addEventListener('click', async () => {
        if (!miStreamLocal) {
            try {
                // 1. Solicitar acceso al micrófono del usuario
                miStreamLocal = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                statusDiv.innerText = "🎙️ Micrófono activado. Conectando a la sala...";
                btnMicrofono.innerText = "Mutear Micrófono";
                btnMicrofono.classList.add('mutear');

                // 2. Inicializar PeerJS (Usa los servidores en la nube gratuitos de PeerJS)
                // Generamos un ID único para este usuario
                const miIdUnico = SALA_ID + "_" + Math.floor(Math.random() * 10000);
                peer = new Peer(miIdUnico);

                peer.on('open', (id) => {
                    statusDiv.innerText = "✅ Conectado a la sala de voz en vivo.";
                    // Aquí le avisarías a tu server1.js (vía socket.io) que entraste
                    // para que los demás sepan tu ID y te llamen.
                });

                // 3. Escuchar llamadas entrantes de otros usuarios que se unan
                peer.on('call', (llamada) => {
                    // Responder la llamada enviando nuestro propio audio
                    llamada.answer(miStreamLocal);
                    
                    // Recibir el audio de la otra persona y reproducirlo
                    llamada.on('stream', (streamRemoto) => {
                        reproducirAudioRemoto(streamRemoto, llamada.peer);
                    });
                });

            } catch (error) {
                console.error("Error al acceder al micrófono:", error);
                statusDiv.innerText = "❌ Error: Debes permitir el acceso al micrófono.";
            }
        } else {
            // Lógica básica para Mutear / Desmutear
            const audioTrack = miStreamLocal.getAudioTracks()[0];
            if (audioTrack.enabled) {
                audioTrack.enabled = false;
                btnMicrofono.innerText = "Encender Micrófono";
                btnMicrofono.classList.remove('mutear');
                statusDiv.innerText = "🔇 Micrófono silenciado";
            } else {
                audioTrack.enabled = true;
                btnMicrofono.innerText = "Mutear Micrófono";
                btnMicrofono.classList.add('mutear');
                statusDiv.innerText = "🎙️ Hablando en vivo...";
            }
        }
    });

    // Función para crear un reproductor de audio invisible para cada participante nuevo
    function reproducirAudioRemoto(stream, peerId) {
        // Evitar duplicar el reproductor si ya existe
        if (document.getElementById(peerId)) return;

        const audioHtml = document.createElement('audio');
        audioHtml.id = peerId;
        audioHtml.srcObject = stream;
        audioHtml.autoplay = true;
        audioHtml.controls = false; // Invisible
        audiosContenedor.appendChild(audioHtml);
        
        // Agregar burbuja visual
        const listaUsuarios = document.getElementById('usuarios');
        const burbuja = document.createElement('div');
        burbuja.className = 'usuario-burbuja';
        burbuja.id = "visual_" + peerId;
        burbuja.innerText = "🗣️ Oyente/Hablante";
        listaUsuarios.appendChild(burbuja);
    }
</script>
</body>
</html>
