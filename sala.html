<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sala - Quiniela360</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<header class="header-sala">
  <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
    <div>
      <h2 id="titulo-sala" style="margin:0; font-size: 16px;">Quiniela360 Live</h2>
      <h2 id="usuario" style="margin:5px 0 0 0; font-size: 14px; font-weight: normal;">Cargando...</h2>
    </div>
    
    <div style="text-align: right;">
      <div class="info">Créditos: <span id="creditos">0</span></div>
      <a href="index.html" class="btn-regresar" style="text-decoration: none; display: block; margin-top: 5px;">⬅️ Volver</a>
    </div>
  </div>
</header>

<div class="main-layout">
    <div class="left-column">
        <div class="audio-controls">
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <button id="btn-video" class="btn-mic" style="background-color: #3a3a3d;">📷 Iniciar Cam</button>
                <button id="btn-audio" class="btn-mic" style="background-color: #3a3a3d;">🎙️ Iniciar Micro</button>
            </div>
            <div id="status-voz">Desconectado. Activa tu cámara o micro para transmitir al grupo.</div>
        </div>
        <div class="usuarios-seccion">
            <h5 style="margin:0; color: #adadb8; text-transform: uppercase; font-size: 10px;">Participantes:</h5>
            <div class="usuarios-lista" id="usuarios-lista"></div>
        </div>
    </div>

    <div class="center-column">
        <div class="tv-wrapper">
            <iframe src="live.html" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="right-column">
        <div class="chat-header">
            <span id="chat-titulo-sala">💬 CHAT</span>
            <span id="chat-status">Conectando...</span>
        </div>
        <ul id="chat-messages"></ul>
        <form id="chat-form">
            <input id="chat-input" placeholder="Enviar un mensaje..." autocomplete="off" required />
            <div class="chat-submit-container">
                <button type="submit">Chatear</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC8itN53SkagtwJPqw6XSllsUP8w7-o7d8",
        authDomain: "quiniela-hydra.firebaseapp.com",
        projectId: "quiniela-hydra",
        storageBucket: "quiniela-hydra.firebasestorage.app",
        messagingSenderId: "329849216739",
        appId: "1:329849216739:web:83d23ff1424eb167172fd6",
        measurementId: "G-FWDDQ5HQYV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        // --- PROTECCIÓN: Si no hay usuario, redirigir a index.html ---
        if (!user) {
            window.location.href = "index.html";
            return;
        }
        
        const nombreUsuario = user.displayName || user.email.split("@")[0];
        document.getElementById("usuario").innerText = `Bienvenido, ${nombreUsuario}`;
        
        const userSnap = await getDoc(doc(db, "users", user.uid));
        if (userSnap.exists()) {
            document.getElementById("creditos").innerText = userSnap.data().creditos ?? 0;
        }
        
        iniciarSala(nombreUsuario);
    });

    function iniciarSala(miNombre) {
        const URL_CHAT = "https://quiniela-hydra-1.onrender.com"; 
        const socket = io(URL_CHAT);
        const urlParams = new URLSearchParams(window.location.search);
        const miGrupo = urlParams.get('grupo') || "General";
        
        document.getElementById('titulo-sala').innerText = `Quiniela360 Live | Grupo: ${miGrupo}`;
        document.getElementById('chat-titulo-sala').innerText = `💬 CHAT - ${miGrupo.toUpperCase()}`;

        const btnVideo = document.getElementById('btn-video');
        const btnAudio = document.getElementById('btn-audio');
        const statusVoz = document.getElementById('status-voz');
        const usuariosLista = document.getElementById('usuarios-lista');
        const chatStatus = document.getElementById('chat-status');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        let miStreamLocal = null;
        let miPeer = null;
        let videoActivo = false;
        let audioActivo = false;

        socket.on('connect', () => {
            chatStatus.innerText = "EN LÍNEA";
            chatStatus.style.background = "#002b1b";
            chatStatus.style.color = "#00f593";
        });

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (chatInput.value.trim()) {
                socket.emit('chat message', { user: miNombre, text: chatInput.value });
                chatInput.value = '';
            }
        });

        socket.on('chat message', (data) => {
            const item = document.createElement('li');
            item.innerHTML = `<span class="user-name">${data.user}:</span><span>${data.text}</span>`;
            chatMessages.appendChild(item);
            chatMessages.scrollTop = chatMessages.scrollHeight; 
        });

        async function inicializarMedios() {
            try {
                miStreamLocal = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true }, 
                    video: { width: 320, height: 240, frameRate: 15 }
                });
                
                miStreamLocal.getVideoTracks().forEach(t => t.enabled = false);
                miStreamLocal.getAudioTracks().forEach(t => t.enabled = false);

                miPeer = new Peer(undefined, {
                    config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
                });

                miPeer.on('open', (peerId) => {
                    statusVoz.innerText = `✅ Conectado al grupo: ${miGrupo}`;
                    agregarCuadroVideo(miPeer.id, `${miNombre} (Tú)`, miStreamLocal, true);
                    socket.emit('join-room', { peerId: peerId, nombre: miNombre, grupo: miGrupo });
                });

                miPeer.on('call', (llamada) => {
                    llamada.answer(miStreamLocal); 
                    llamada.on('stream', (streamRemoto) => {
                        agregarCuadroVideo(llamada.peer, "Participante", streamRemoto, false);
                    });
                });
                return true;
            } catch (error) {
                statusVoz.innerText = "❌ Error de permisos.";
                return false;
            }
        }

        btnVideo.addEventListener('click', async () => {
            if (!miStreamLocal && !(await inicializarMedios())) return;
            videoActivo = !videoActivo;
            miStreamLocal.getVideoTracks()[0].enabled = videoActivo;
            btnVideo.innerText = videoActivo ? "📹 Apagar Cam" : "📷 Encender Cam";
        });

        btnAudio.addEventListener('click', async () => {
            if (!miStreamLocal && !(await inicializarMedios())) return;
            audioActivo = !audioActivo;
            miStreamLocal.getAudioTracks()[0].enabled = audioActivo;
            btnAudio.innerText = audioActivo ? "🔇 Silenciar Mic" : "🎙️ Activar Mic";
        });

        function agregarCuadroVideo(id, nombre, stream, esPropio) {
            if (document.getElementById(`container-${id}`)) return;
            const contenedor = document.createElement('div');
            contenedor.className = 'video-box-container';
            contenedor.id = `container-${id}`;
            contenedor.innerHTML = `<video autoplay ${esPropio ? 'muted' : ''} playsinline></video><div class="video-label">${nombre}</div>`;
            contenedor.querySelector('video').srcObject = stream;
            usuariosLista.appendChild(contenedor);
        }
    }
</script>
</body>
</html>
