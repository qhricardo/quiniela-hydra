<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela360 | Sala en Vivo estilo Twitch</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 10px; 
            background-color: #0e0e10; /* Color oscuro exacto de Twitch */
            color: #efeff1;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Encabezado */
        .header-sala {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px 10px 10px;
            border-bottom: 1px solid #26262c;
        }
        .btn-regresar {
            padding: 6px 14px;
            background-color: #1f1f23;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            font-size: 13px;
            transition: 0.2s;
            border: 1px solid #3a3a3d;
            cursor: pointer;
        }
        .btn-regresar:hover { background-color: #26262c; }

        /* ESTRUCTURA DE 3 COLUMNAS (ESTILO TWITCH) */
        .main-layout {
            display: flex;
            gap: 12px;
            flex-grow: 1;
            height: calc(100vh - 65px);
            min-height: 0;
            margin-top: 10px;
        }

        /* COLUMNA 1 (IZQUIERDA): USUARIOS Y CONTROLES */
        .left-column {
            flex: 0 0 240px; /* Ancho fijo estilo barra lateral */
            background: #1f1f23;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #26262c;
        }
        .audio-controls {
            background: #18181b;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #26262c;
        }
        .btn-mic { 
            background-color: #9146ff; /* Morado Twitch */
            color: white; 
            border: none; 
            padding: 10px 15px; 
            font-size: 13px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            transition: 0.2s;
        }
        .btn-mic:hover { background-color: #772ce8; }
        .btn-mic.mutear { background-color: #eb0400; }
        .btn-mic.mutear:hover { background-color: #c20300; }
        #status-voz { margin-top: 8px; font-size: 11px; color: #adadb8; line-height: 1.3; }

        .usuarios-seccion {
            background: #18181b;
            padding: 12px;
            border-radius: 6px;
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #26262c;
        }
        .usuarios-lista { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        .usuario-burbuja { 
            background: #26262c; 
            padding: 8px 12px; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 13px; 
        }
        .status-dot { width: 8px; height: 8px; background-color: #00f593; border-radius: 50%; }

        /* COLUMNA 2 (CENTRO): TRANSMISIÓN FIJA */
        .center-column {
            flex: 3;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative;
        }
        .tv-wrapper { 
            width: 100%;
            height: 100%;
            position: relative;
        }
        .tv-wrapper iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* COLUMNA 3 (DERECHA): CHAT */
        .right-column {
            flex: 0 0 340px; /* Ancho fijo para el chat */
            background: #1f1f23;
            border: 1px solid #26262c;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 12px;
            border-bottom: 1px solid #26262c;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #18181b;
        }
        #chat-status { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: #26262c; color: #adadb8; }
        
        #chat-messages {
            flex-grow: 1;
            padding: 12px;
            margin: 0;
            list-style: none;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #chat-messages li {
            font-size: 13px;
            line-height: 1.5;
            word-break: break-word;
        }
        #chat-messages .user-name { color: #9146ff; font-weight: bold; margin-right: 6px; }
        
        #chat-form {
            padding: 10px;
            border-top: 1px solid #26262c;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #18181b;
        }
        #chat-input {
            background: #26262c;
            border: 2px solid transparent;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            font-size: 13px;
            transition: 0.2s;
        }
        #chat-input:focus { border-color: #9146ff; background: #000; }
        
        .chat-submit-container {
            display: flex;
            justify-content: flex-end;
        }
        #chat-form button {
            background: #9146ff;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
        }
        #chat-form button:hover { background-color: #772ce8; }

        /* Scrollbars oscuros */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0e0e10; }
        ::-webkit-scrollbar-thumb { background: #464649; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #5d5d62; }

        /* Responsivo */
        @media (max-width: 1024px) {
            .main-layout { flex-direction: column; height: auto; }
            .left-column, .right-column { flex: none; width: 100%; max-width: 100%; }
            .center-column { aspect-ratio: 16 / 9; height: auto; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

<div class="header-sala">
    <h2 style="margin:0; font-size: 18px; letter-spacing: 0.3px;">Quiniela360 Live</h2>
    <a href="index.html" class="btn-regresar">⬅️ Volver</a>
</div>

<div class="main-layout">
    
    <div class="left-column">
        <div class="audio-controls">
            <button id="btn-microfono" class="btn-mic">🎙️ Conectar Voz</button>
            <div id="status-voz">Desconectado. Presiona para hablar con la sala.</div>
        </div>

        <div class="usuarios-seccion">
            <h5 style="margin:0; color: #adadb8; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">Hablando Ahora:</h5>
            <div class="usuarios-lista" id="usuarios-lista"></div>
        </div>
    </div>

    <div class="center-column">
        <div class="tv-wrapper">
            <iframe src="live.html" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="right-column">
        <div class="chat-header">
            <span>💬 CHAT DE LA SALA</span>
            <span id="chat-status">Conectando...</span>
        </div>
        <ul id="chat-messages"></ul>
        <form id="chat-form">
            <input id="chat-input" placeholder="Enviar un mensaje..." autocomplete="off" required />
            <div class="chat-submit-container">
                <button type="submit">Chatear</button>
            </div>
        </form>
    </div>

</div>

<div id="audios-ocultos" style="display:none;"></div>

<script>
    const URL_CHAT = "https://quiniela-hydra-1.onrender.com"; 
    const socket = io(URL_CHAT);
    
    const btnMicrofono = document.getElementById('btn-microfono');
    const statusVoz = document.getElementById('status-voz');
    const usuariosLista = document.getElementById('usuarios-lista');
    const audiosOcultos = document.getElementById('audios-ocultos');
    const chatStatus = document.getElementById('chat-status');
    
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    let miStreamLocal = null;
    let miPeer = null;
    const miNombre = "Usuario_" + Math.floor(Math.random() * 900 + 100);

    // Estados de Conexión del Chat
    socket.on('connect', () => {
        chatStatus.innerText = "EN LÍNEA";
        chatStatus.style.background = "#002b1b";
        chatStatus.style.color = "#00f593";
    });

    socket.on('disconnect', () => {
        chatStatus.innerText = "DESCONECTADO";
        chatStatus.style.background = "#3b0000";
        chatStatus.style.color = "#ff4a4a";
    });

    // Lógica de Mensajería
    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (chatInput.value.trim()) {
            socket.emit('chat message', { user: miNombre, text: chatInput.value });
            chatInput.value = '';
        }
    });

    socket.on('chat message', (data) => {
        const item = document.createElement('li');
        item.innerHTML = `<span class="user-name">${data.user}:</span><span>${data.text}</span>`;
        chatMessages.appendChild(item);
        chatMessages.scrollTop = chatMessages.scrollHeight; 
    });

    // Lógica del Canales de Voz WebRTC
    btnMicrofono.addEventListener('click', async () => {
        window.audioContextGlobal = new (window.AudioContext || window.webkitAudioContext)();
        if (window.audioContextGlobal.state === 'suspended') {
            await window.audioContextGlobal.resume();
        }

        if (!miStreamLocal) {
            try {
                miStreamLocal = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }, 
                    video: false 
                });
                
                statusVoz.innerText = "🎙️ Conectando...";
                btnMicrofono.innerText = "🔇 Silenciar Mic";
                btnMicrofono.classList.add('mutear');

                miPeer = new Peer(undefined, {
                    config: { 
                        'iceServers': [
                            { 'urls': 'stun:stun.l.google.com:19302' },
                            { 'urls': 'stun:stun1.l.google.com:19302' },
                            { 'urls': 'stun:stun2.l.google.com:19302' }
                        ] 
                    }
                });

                miPeer.on('open', (peerId) => {
                    statusVoz.innerText = `✅ Activo: ${miNombre}`;
                    agregarBurbujaUsuario(miPeer.id, `${miNombre} (Tú)`);
                    socket.emit('join-voice', { peerId: peerId, nombre: miNombre });
                });

                miPeer.on('call', (llamada) => {
                    llamada.answer(miStreamLocal); 
                    llamada.on('stream', (streamRemoto) => {
                        reproducirAudioEntrante(streamRemoto, llamada.peer);
                    });
                });

            } catch (error) {
                console.error(error);
                statusVoz.innerText = "❌ Permitir micrófono.";
            }
        } else {
            const audioTrack = miStreamLocal.getAudioTracks()[0];
            if (audioTrack.enabled) {
                audioTrack.enabled = false;
                btnMicrofono.innerText = "🎙️ Hablar";
                btnMicrofono.classList.remove('mutear');
                statusVoz.innerText = "🔇 Micrófono silenciado.";
            } else {
                audioTrack.enabled = true;
                btnMicrofono.innerText = "🔇 Silenciar Mic";
                btnMicrofono.classList.add('mutear');
                statusVoz.innerText = "🗣️ Transmitiendo voz...";
            }
        }
    });

    socket.on('user-joined-voice', (data) => {
        if (miPeer && miStreamLocal && data.peerId !== miPeer.id) {
            agregarBurbujaUsuario(data.peerId, data.nombre);
            socket.emit('reply-voice', { peerId: miPeer.id, nombre: miNombre });
            setTimeout(() => { conectarAPeer(data.peerId); }, 1000);
        }
    });

    socket.on('user-replied-voice', (data) => {
        if (miPeer && miStreamLocal && data.peerId !== miPeer.id) {
            agregarBurbujaUsuario(data.peerId, data.nombre);
            setTimeout(() => { conectarAPeer(data.peerId); }, 1000);
        }
    });

    socket.on('user-left-voice', (peerId) => {
        const burbuja = document.getElementById(`user-${peerId}`);
        if (burbuja) burbuja.remove();
        const audio = document.getElementById(`audio-${peerId}`);
        if (audio) audio.remove();
    });

    function conectarAPeer(remotePeerId) {
        if (!miPeer || miPeer.destroyed) return;
        const llamada = miPeer.call(remotePeerId, miStreamLocal);
        if (llamada) {
            llamada.on('stream', (streamRemoto) => {
                reproducirAudioEntrante(streamRemoto, remotePeerId);
            });
        }
    }

    function agregarBurbujaUsuario(id, nombre) {
        if (document.getElementById(`user-${id}`)) return;
        const burbuja = document.createElement('div');
        burbuja.className = 'usuario-burbuja';
        burbuja.id = `user-${id}`;
        burbuja.innerHTML = `<span class="status-dot"></span> ${nombre}`;
        usuariosLista.appendChild(burbuja);
    }

    function reproducirAudioEntrante(stream, peerId) {
        let elAudio = document.getElementById(`audio-${peerId}`);
        if (!elAudio) {
            elAudio = document.createElement('audio');
            elAudio.id = `audio-${peerId}`;
            audiosOcultos.appendChild(elAudio);
        }
        elAudio.srcObject = stream;
        elAudio.autoplay = true;
        elAudio.playsInline = true;
        elAudio.muted = false;
        
        const forzarPlay = () => { elAudio.play().catch(() => {}); };
        forzarPlay();

        document.body.addEventListener('click', forzarPlay, { once: false });
        document.body.addEventListener('touchstart', forzarPlay, { once: false });
    }
</script>
</body>
</html>
