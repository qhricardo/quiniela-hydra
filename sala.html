<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela360 | Sala de Grupo</title>
    
   <style>
    :root {
        --fifa-blue: #002e5d;
        --fifa-gold: #ffc20e;
        --fifa-green: #00a859;
        --bg-dark: #050a14;
    }

    body { 
        font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
        margin: 0; padding: 10px; 
        background-color: var(--bg-dark); 
        color: #fff; height: 100vh;
        box-sizing: border-box; display: flex; flex-direction: column;
    }

    /* Header con estilo de marcador oficial */
    .header-sala {
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 20px;
        background: linear-gradient(90deg, var(--fifa-blue) 0%, #001a33 100%);
        border-bottom: 4px solid var(--fifa-gold);
        border-radius: 8px;
    }

    .btn-regresar {
        padding: 8px 16px;
        background-color: var(--fifa-gold);
        color: #000;
        font-weight: 800;
        text-transform: uppercase;
        border-radius: 4px;
        transition: all 0.3s ease;
    }

    .btn-regresar:hover {
        background-color: #fff;
        transform: scale(1.05);
    }

    /* Layout principal */
    .main-layout {
        display: flex; gap: 15px; flex-grow: 1; margin-top: 15px;
    }

    /* Columna izquierda (Cámaras) */
    .left-column {
        flex: 0 0 250px; 
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--fifa-blue);
        border-radius: 8px; padding: 10px;
    }

    .btn-mic { 
        background-color: var(--fifa-green); 
        transition: background 0.3s ease;
    }
    .btn-mic:hover { filter: brightness(1.2); }
    .btn-mic.mutear { background-color: #d60000; }

    /* Video Central (La Cancha) */
    .center-column {
        flex: 3;
        border: 4px solid var(--fifa-blue);
        border-radius: 12px;
        background: #000;
        box-shadow: 0 0 30px rgba(0, 168, 89, 0.15);
    }

    /* Chat (Tribuna) */
    .right-column {
        flex: 0 0 340px; 
        background: #0a1526;
        border: 1px solid var(--fifa-blue);
        border-radius: 8px;
    }
    
    .chat-header {
        background: var(--fifa-blue);
        padding: 10px;
        border-bottom: 2px solid var(--fifa-gold);
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    #chat-messages .user-name { color: var(--fifa-gold); font-weight: bold; }

    #chat-form button {
        background: var(--fifa-green);
        transition: transform 0.2s;
    }
    #chat-form button:hover { transform: translateY(-2px); }

    /* Scrollbar estético */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--fifa-blue); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--fifa-gold); }
</style>

    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

<header class="header-sala">
  <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
    <div>
      <h2 id="titulo-sala" style="margin:0; font-size: 16px;">Quiniela360 Fan Fest</h2>
      <h2 id="usuario" style="margin:5px 0 0 0; font-size: 14px; font-weight: normal;">Cargando...</h2>
    </div>
    
    <div style="text-align: right;">
      <div class="info">Fan Fest <span id="creditos">0</span></div>
      <a href="index.html" class="btn-regresar" style="text-decoration: none; display: block; margin-top: 5px;">⬅️ Volver</a>
    </div>
  </div>
</header>

<div class="main-layout">
    
    <div class="left-column">
        <div class="audio-controls">
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <button id="btn-video" class="btn-mic" style="background-color: #3a3a3d;">📷 Iniciar Cam</button>
                <button id="btn-audio" class="btn-mic" style="background-color: #3a3a3d;">🎙️ Iniciar Micro</button>
            </div>
            <div id="status-voz">Desconectado. Activa tu cámara o micro para transmitir al grupo.</div>
        </div>
        <div class="usuarios-seccion">
            <h5 style="margin:0; color: #adadb8; text-transform: uppercase; font-size: 10px;">Participantes:</h5>
            <div class="usuarios-lista" id="usuarios-lista"></div>
        </div>
    </div>

    <div class="center-column">
        <div class="tv-wrapper">
            <iframe src="live.html" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="right-column">
        <div class="chat-header">
            <span id="chat-titulo-sala">💬 CHAT</span>
            <span id="chat-status">Conectando...</span>
        </div>
        <ul id="chat-messages"></ul>
        <form id="chat-form">
            <input id="chat-input" placeholder="Enviar un mensaje..." autocomplete="off" required />
            <div class="chat-submit-container">
                <button type="submit">Chatear</button>
            </div>
        </form>
    </div>

</div>

<script>
    const URL_CHAT = "https://quiniela-hydra-1.onrender.com"; 
    const socket = io(URL_CHAT);
    
    const urlParams = new URLSearchParams(window.location.search);
    const miGrupo = urlParams.get('grupo') || "General";
    
    document.getElementById('titulo-sala').innerText = `Quiniela360 Live | Grupo: ${miGrupo}`;
    document.getElementById('chat-titulo-sala').innerText = `💬 CHAT - ${miGrupo.toUpperCase()}`;

    const btnVideo = document.getElementById('btn-video');
    const btnAudio = document.getElementById('btn-audio');
    
    const statusVoz = document.getElementById('status-voz');
    const usuariosLista = document.getElementById('usuarios-lista');
    const chatStatus = document.getElementById('chat-status');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    let miStreamLocal = null;
    let miPeer = null;
    let videoActivo = false;
    let audioActivo = false;
    const miNombre = "Usuario_" + Math.floor(Math.random() * 900 + 100);

    socket.on('connect', () => {
        chatStatus.innerText = "EN LÍNEA";
        chatStatus.style.background = "#002b1b";
        chatStatus.style.color = "#00f593";
    });

    socket.on('disconnect', () => {
        chatStatus.innerText = "DESCONECTADO";
        chatStatus.style.background = "#3b0000";
    });

    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (chatInput.value.trim()) {
            socket.emit('chat message', { user: miNombre, text: chatInput.value });
            chatInput.value = '';
        }
    });

    socket.on('chat message', (data) => {
        const item = document.createElement('li');
        item.innerHTML = `<span class="user-name">${data.user}:</span><span>${data.text}</span>`;
        chatMessages.appendChild(item);
        chatMessages.scrollTop = chatMessages.scrollHeight; 
    });

    async function inicializarMedios() {
        window.audioContextGlobal = new (window.AudioContext || window.webkitAudioContext)();
        if (window.audioContextGlobal.state === 'suspended') await window.audioContextGlobal.resume();

        if (!miStreamLocal) {
            try {
                miStreamLocal = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true }, 
                    video: { width: 320, height: 240, frameRate: 15 }
                });
                
                miStreamLocal.getVideoTracks().forEach(t => t.enabled = false);
                miStreamLocal.getAudioTracks().forEach(t => t.enabled = false);

                miPeer = new Peer(undefined, {
                    config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
                });

                miPeer.on('open', (peerId) => {
                    statusVoz.innerText = `✅ Conectado al grupo: ${miGrupo}`;
                    agregarCuadroVideo(miPeer.id, `${miNombre} (Tú)`, miStreamLocal, true);
                    socket.emit('join-room', { peerId: peerId, nombre: miNombre, grupo: miGrupo });
                });

                miPeer.on('call', (llamada) => {
                    llamada.answer(miStreamLocal); 
                    llamada.on('stream', (streamRemoto) => {
                        agregarCuadroVideo(llamada.peer, "Compañero", streamRemoto, false);
                    });
                });

            } catch (error) {
                console.error(error);
                statusVoz.innerText = "❌ Error de permisos multimedia.";
                miStreamLocal = null;
                return false;
            }
        }
        return true;
    }

    btnVideo.addEventListener('click', async () => {
        if (!miStreamLocal) {
            const listo = await inicializarMedios();
            if (!listo) return;
        }

        const videoTrack = miStreamLocal.getVideoTracks()[0];
        if (videoTrack) {
            videoActivo = !videoActivo;
            videoTrack.enabled = videoActivo;
            
            if (videoActivo) {
                btnVideo.innerText = "📹 Apagar Cam";
                btnVideo.classList.remove('mutear');
                btnVideo.classList.add('activo');
            } else {
                btnVideo.innerText = "📷 Encender Cam";
                btnVideo.classList.remove('activo');
                btnVideo.classList.add('mutear');
            }
        }
        verificarDesconexionFalsa();
    });

    btnAudio.addEventListener('click', async () => {
        if (!miStreamLocal) {
            const listo = await inicializarMedios();
            if (!listo) return;
        }

        const audioTrack = miStreamLocal.getAudioTracks()[0];
        if (audioTrack) {
            audioActivo = !audioActivo;
            audioTrack.enabled = audioActivo;
            
            if (audioActivo) {
                btnAudio.innerText = "🔇 Silenciar Mic";
                btnAudio.classList.remove('mutear');
                btnAudio.classList.add('activo');
            } else {
                btnAudio.innerText = "🎙️ Activar Mic";
                btnAudio.classList.remove('activo');
                btnAudio.classList.add('mutear');
            }
        }
        verificarDesconexionFalsa();
    });

    function verificarDesconexionFalsa() {
        if (!videoActivo && !audioActivo && miStreamLocal) {
            miStreamLocal.getTracks().forEach(track => track.stop());
            miStreamLocal = null;
            const miCaja = document.getElementById(`container-${miPeer.id}`);
            if (miCaja) miCaja.remove();
            miPeer.destroy();
            
            btnVideo.innerText = "📷 Iniciar Cam";
            btnVideo.classList.remove('activo', 'mutear');
            btnAudio.innerText = "🎙️ Iniciar Micro";
            btnAudio.classList.remove('activo', 'mutear');
            statusVoz.innerText = "Desconectado.";
        }
    }

    socket.on('user-joined-room', (data) => {
        if (miPeer && miStreamLocal && data.peerId !== miPeer.id) {
            socket.emit('reply-room', { peerId: miPeer.id, nombre: miNombre });
            setTimeout(() => { conectarAPeer(data.peerId); }, 1200);
        }
    });

    socket.on('user-replied-room', (data) => {
        if (miPeer && miStreamLocal && data.peerId !== miPeer.id) {
            setTimeout(() => { conectarAPeer(data.peerId); }, 1200);
        }
    });

    socket.on('user-left-room', (peerId) => {
        const contenedorVideo = document.getElementById(`container-${peerId}`);
        if (contenedorVideo) contenedorVideo.remove();
    });

    function conectarAPeer(remotePeerId) {
        if (!miPeer || miPeer.destroyed) return;
        const llamada = miPeer.call(remotePeerId, miStreamLocal);
        if (llamada) {
            llamada.on('stream', (streamRemoto) => {
                agregarCuadroVideo(remotePeerId, "Participante", streamRemoto, false);
            });
        }
    }

    function agregarCuadroVideo(id, nombre, stream, esPropio) {
        if (document.getElementById(`container-${id}`)) return;

        const contenedor = document.createElement('div');
        contenedor.className = 'video-box-container';
        contenedor.id = `container-${id}`;

        const videoElemento = document.createElement('video');
        videoElemento.id = `video-${id}`;
        videoElemento.srcObject = stream;
        videoElemento.autoplay = true;
        videoElemento.setAttribute('playsinline', 'true');
        videoElemento.setAttribute('webkit-playsinline', 'true');
        
        // El video remoto NO debe estar silenciado, pero el propio SÍ obligatoriamente
        if (esPropio) {
            videoElemento.muted = true;
        } else {
            videoElemento.muted = false;
        }

        const etiqueta = document.createElement('div');
        etiqueta.className = 'video-label';
        etiqueta.innerText = nombre;

        contenedor.appendChild(videoElemento);
        contenedor.appendChild(etiqueta);
        usuariosLista.appendChild(contenedor);
        
        // Forzamos play de forma asíncrona manejando la promesa
        setTimeout(() => {
            videoElemento.play().catch(err => console.log("Video play interceptado:", err));
        }, 300);
    }
</script>
</body>
</html>
