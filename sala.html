<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela360 | Sala de Grupo estilo Twitch</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 10px; 
            background-color: #0e0e10; 
            color: #efeff1;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .header-sala {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px 10px 10px;
            border-bottom: 1px solid #26262c;
        }
        .btn-regresar {
            padding: 6px 14px;
            background-color: #1f1f23;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            font-size: 13px;
            transition: 0.2s;
            border: 1px solid #3a3a3d;
            cursor: pointer;
        }
        .btn-regresar:hover { background-color: #26262c; }

        .main-layout {
            display: flex;
            gap: 12px;
            flex-grow: 1;
            height: calc(100vh - 65px);
            min-height: 0;
            margin-top: 10px;
        }

        /* COLUMNA DERECHA CAMBIADA A REJILLA DE VIDEOS */
        .left-column {
            flex: 0 0 260px; 
            background: #1f1f23;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #26262c;
        }
        .audio-controls {
            background: #18181b;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #26262c;
        }
        .btn-mic { 
            background-color: #9146ff; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            font-size: 13px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            transition: 0.2s;
        }
        .btn-mic:hover { background-color: #772ce8; }
        .btn-mic.mutear { background-color: #eb0400; }

        .usuarios-seccion {
            background: #18181b;
            padding: 12px;
            border-radius: 6px;
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #26262c;
        }
        
        /* Contenedor vertical de videos de participantes */
        .usuarios-lista { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-top: 10px; 
        }
        
        /* Contenedor de cada cámara individual */
        .video-box-container {
            background: #26262c;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #3a3a3d;
            position: relative;
            aspect-ratio: 4 / 3;
            width: 100%;
        }
        .video-box-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }
        .video-label {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 3px;
            color: #fff;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* COLUMNA CENTRAL (STREAM) */
        .center-column {
            flex: 3;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .tv-wrapper { width: 100%; height: 100%; position: relative; }
        .tv-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* COLUMNA DERECHA (CHAT) */
        .right-column {
            flex: 0 0 340px; 
            background: #1f1f23;
            border: 1px solid #26262c;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 12px;
            border-bottom: 1px solid #26262c;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #18181b;
        }
        #chat-status { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: #26262c; color: #adadb8; }
        
        #chat-messages {
            flex-grow: 1;
            padding: 12px;
            margin: 0;
            list-style: none;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #chat-messages li { font-size: 13px; line-height: 1.5; word-break: break-word; }
        #chat-messages .user-name { color: #9146ff; font-weight: bold; margin-right: 6px; }
        
        #chat-form {
            padding: 10px;
            border-top: 1px solid #26262c;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #18181b;
        }
        #chat-input {
            background: #26262c;
            border: 2px solid transparent;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            font-size: 13px;
        }
        #chat-input:focus { border-color: #9146ff; background: #000; }
        
        .chat-submit-container { display: flex; justify-content: flex-end; }
        #chat-form button {
            background: #9146ff; color: white; border: none; padding: 6px 12px;
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0e0e10; }
        ::-webkit-scrollbar-thumb { background: #464649; border-radius: 3px; }

        @media (max-width: 1024px) {
            .main-layout { flex-direction: column; height: auto; }
            .left-column, .right-column { flex: none; width: 100%; max-width: 100%; }
            .center-column { aspect-ratio: 16 / 9; height: auto; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

<div class="header-sala">
    <h2 id="titulo-sala" style="margin:0; font-size: 18px; letter-spacing: 0.3px;">Quiniela360 Live</h2>
    <a href="index.html" class="btn-regresar">⬅️ Volver</a>
</div>

<div class="main-layout">
    
    <div class="left-column">
        <div class="audio-controls">
            <button id="btn-microfono" class="btn-mic">📹 Activar Cámara y Voz</button>
            <div id="status-voz">Desconectado. Únete para transmitir a tu grupo.</div>
        </div>

        <div class="usuarios-seccion">
            <h5 style="margin:0; color: #adadb8; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">Participantes:</h5>
            <div class="usuarios-lista" id="usuarios-lista"></div>
        </div>
    </div>

    <div class="center-column">
        <div class="tv-wrapper">
            <iframe src="live.html" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="right-column">
        <div class="chat-header">
            <span id="chat-titulo-sala">💬 CHAT</span>
            <span id="chat-status">Conectando...</span>
        </div>
        <ul id="chat-messages"></ul>
        <form id="chat-form">
            <input id="chat-input" placeholder="Enviar un mensaje al grupo..." autocomplete="off" required />
            <div class="chat-submit-container">
                <button type="submit">Chatear</button>
            </div>
        </form>
    </div>

</div>

<script>
    const URL_CHAT = "https://quiniela-hydra-1.onrender.com"; 
    const socket = io(URL_CHAT);
    
    // Obtener el ID del grupo desde la URL de la página web (?grupo=GrupoNombre)
    const urlParams = new URLSearchParams(window.location.search);
    const miGrupo = urlParams.get('grupo') || "General";
    
    // Personalizar títulos en base al grupo conectado
    document.getElementById('titulo-sala').innerText = `Quiniela360 Live | Grupo: ${miGrupo}`;
    document.getElementById('chat-titulo-sala').innerText = `💬 CHAT - ${miGrupo.toUpperCase()}`;

    const btnMicrofono = document.getElementById('btn-microfono');
    const statusVoz = document.getElementById('status-voz');
    const usuariosLista = document.getElementById('usuarios-lista');
    const chatStatus = document.getElementById('chat-status');
    
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    let miStreamLocal = null;
    let miPeer = null;
    const miNombre = "Usuario_" + Math.floor(Math.random() * 900 + 100);

    socket.on('connect', () => {
        chatStatus.innerText = "EN LÍNEA";
        chatStatus.style.background = "#002b1b";
        chatStatus.style.color = "#00f593";
    });

    socket.on('disconnect', () => {
        chatStatus.innerText = "DESCONECTADO";
        chatStatus.style.background = "#3b0000";
    });

    // 💬 CHAT FILTRADO POR SALA
    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (chatInput.value.trim()) {
            socket.emit('chat message', { user: miNombre, text: chatInput.value });
            chatInput.value = '';
        }
    });

    socket.on('chat message', (data) => {
        const item = document.createElement('li');
        item.innerHTML = `<span class="user-name">${data.user}:</span><span>${data.text}</span>`;
        chatMessages.appendChild(item);
        chatMessages.scrollTop = chatMessages.scrollHeight; 
    });

    // 📹 LÓGICA DE VIDEO Y AUDIO COMBINADOS (WEBRTC)
    btnMicrofono.addEventListener('click', async () => {
        window.audioContextGlobal = new (window.AudioContext || window.webkitAudioContext)();
        if (window.audioContextGlobal.state === 'suspended') await window.audioContextGlobal.resume();

        if (!miStreamLocal) {
            try {
                // CAPTURA DE AUDIO Y VIDEO SIMULTÁNEAMENTE
                miStreamLocal = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true }, 
                    video: { width: 320, height: 240, frameRate: 15 } // Configuración ligera para optimizar datos
                });
                
                statusVoz.innerText = "📹 Conectando Multimedia...";
                btnMicrofono.innerText = "🔇 Desactivar Transmisión";
                btnMicrofono.classList.add('mutear');

                miPeer = new Peer(undefined, {
                    config: { 
                        'iceServers': [
                            { 'urls': 'stun:stun.l.google.com:19302' },
                            { 'urls': 'stun:stun1.l.google.com:19302' }
                        ] 
                    }
                });

                miPeer.on('open', (peerId) => {
                    statusVoz.innerText = `✅ Transmitiendo al grupo`;
                    agregarCuadroVideo(miPeer.id, `${miNombre} (Tú)`, miStreamLocal, true);
                    
                    // Notificar ingreso al servidor especificando el grupo
                    socket.emit('join-room', { peerId: peerId, nombre: miNombre, grupo: miGrupo });
                });

                // Atender llamadas entrantes con audio y video
                miPeer.on('call', (llamada) => {
                    llamada.answer(miStreamLocal); 
                    llamada.on('stream', (streamRemoto) => {
                        agregarCuadroVideo(llamada.peer, "Compañero", streamRemoto, false);
                    });
                });

            } catch (error) {
                console.error(error);
                statusVoz.innerText = "❌ Permite el acceso a la cámara/micrófono.";
            }
        } else {
            // Apagado completo de la cámara web y micrófono
            miStreamLocal.getTracks().forEach(track => track.stop());
            miStreamLocal = null;
            const miCaja = document.getElementById(`container-${miPeer.id}`);
            if (miCaja) miCaja.remove();
            miPeer.destroy();
            btnMicrofono.innerText = "📹 Activar Cámara y Voz";
            btnMicrofono.classList.remove('mutear');
            statusVoz.innerText = "Transmisión finalizada.";
        }
    });

    // Coordinación de Salas
    socket.on('user-joined-room', (data) => {
        if (miPeer && miStreamLocal && data.peerId !== miPeer.id) {
            socket.emit('reply-room', { peerId: miPeer.id, nombre: miNombre });
            setTimeout(() => { conectarAPeer(data.peerId); }, 1200);
        }
    });

    socket.on('user-replied-room', (data) => {
        if (miPeer && miStreamLocal && data.peerId !== miPeer.id) {
            setTimeout(() => { conectarAPeer(data.peerId); }, 1200);
        }
    });

    socket.on('user-left-room', (peerId) => {
        const contenedorVideo = document.getElementById(`container-${peerId}`);
        if (contenedorVideo) contenedorVideo.remove();
    });

    function conectarAPeer(remotePeerId) {
        if (!miPeer || miPeer.destroyed) return;
        const llamada = miPeer.call(remotePeerId, miStreamLocal);
        if (llamada) {
            llamada.on('stream', (streamRemoto) => {
                agregarCuadroVideo(remotePeerId, "Participante", streamRemoto, false);
            });
        }
    }

    // FUNCIÓN PARA GENERAR LOS VIDEOS EN LA COLUMNA DE USUARIOS
    function agregarCuadroVideo(id, nombre, stream, esPropio) {
        if (document.getElementById(`container-${id}`)) {
            const videoExistente = document.getElementById(`video-${id}`);
            if (videoExistente && videoExistente.srcObject !== stream) {
                videoExistente.srcObject = stream;
            }
            return;
        }

        const contenedor = document.createElement('div');
        contenedor.className = 'video-box-container';
        contenedor.id = `container-${id}`;

        const videoElemento = document.createElement('video');
        videoElemento.id = `video-${id}`;
        videoElemento.srcObject = stream;
        videoElemento.autoplay = true;
        videoElemento.playsInline = true;
        
        if (esPropio) {
            videoElemento.muted = true; // No escucharte a ti mismo
        }

        const etiqueta = document.createElement('div');
        etiqueta.className = 'video-label';
        etiqueta.innerText = nombre;

        contenedor.appendChild(videoElemento);
        contenedor.appendChild(etiqueta);
        usuariosLista.appendChild(contenedor);
        
        videoElemento.play().catch(() => {});
    }
</script>
</body>
</html>
