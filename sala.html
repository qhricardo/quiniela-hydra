<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela360 | Sala de TV y Voz en Vivo</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #121212; 
            color: #ffffff;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            text-align: center; 
        }

        /* 🏠 BOTÓN REGRESAR */
        .btn-regresar {
            display: inline-block;
            margin-bottom: 15px;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.2s;
            border: 1px solid #444;
        }
        .btn-regresar:hover {
            background-color: #444;
        }
        
        /* 📺 CONTENEDOR DE LA TV MÁS GRANDE */
        .tv-wrapper { 
            width: 100%; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            margin-bottom: 20px;
            aspect-ratio: 16 / 9;
        }
        .tv-wrapper iframe, .tv-wrapper video {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 🎙️ SECCIÓN DE CONTROLES DE AUDIO */
        .audio-controls {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        .btn-mic { 
            background-color: #28a745; 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            font-size: 18px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }
        .btn-mic:hover { background-color: #218838; }
        .btn-mic.mutear { background-color: #dc3545; box-shadow: 0 4px 10px rgba(220, 53, 69, 0.3); }
        .btn-mic.mutear:hover { background-color: #c82333; }
        
        #status-voz { 
            margin-top: 10px; 
            font-size: 14px; 
            color: #aaa; 
        }

        /* 👥 LISTA DE USUARIOS CONECTADOS */
        .usuarios-seccion {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: left;
        }
        .usuarios-seccion h3 {
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            color: #0084ff;
        }
        .usuarios-lista { 
            display: flex; 
            flex-wrap: wrap;
            gap: 10px; 
            margin-top: 15px;
        }
        .usuario-burbuja { 
            background: #2a2a2a; 
            padding: 10px 20px; 
            border-radius: 20px; 
            border: 1px solid #444; 
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #28a745;
            border-radius: 50%;
            display: inline-block;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

<div class="container">
    
    <div style="text-align: left;">
        <a href="index.html" class="btn-regresar">⬅️ Regresar a la Quiniela</a>
    </div>
    
    <div class="tv-wrapper">
        <iframe src="live.html" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="audio-controls">
        <button id="btn-microfono" class="btn-mic">🎙️ Activar Micrófono e Hablar</button>
        <div id="status-voz">Desconectado del canal de voz. Presiona el botón para hablar.</div>
    </div>

    <div class="usuarios-seccion">
        <h3>En la sala de voz en vivo:</h3>
        <div class="usuarios-lista" id="usuarios-lista">
            </div>
    </div>

</div>

<div id="audios-ocultos" style="display:none;"></div>

<script>
   <script>
    // ⚠️ CONFIGURACIÓN: Reemplaza con tu URL de Render para 'server1.js'
    const URL_CHAT = "https://quiniela-chat-server.onrender.com"; 
    const socket = io(URL_CHAT);
    
    const btnMicrofono = document.getElementById('btn-microfono');
    const statusVoz = document.getElementById('status-voz');
    const usuariosLista = document.getElementById('usuarios-lista');
    const audiosOcultos = document.getElementById('audios-ocultos');

    let miStreamLocal = null;
    let miPeer = null;
    const miNombre = "Usuario_" + Math.floor(Math.random() * 900 + 100);

    btnMicrofono.addEventListener('click', async () => {
        // Desbloquear el motor de audio del navegador de escritorio inmediatamente al hacer clic
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
            const ctx = new AudioContextClass();
            if (ctx.state === 'suspended') ctx.resume();
        }

        if (!miStreamLocal) {
            try {
                // Solicitar micrófono con alta compatibilidad para PC y Móvil
                miStreamLocal = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: true, 
                        noiseSuppression: true,
                        autoGainControl: true
                    }, 
                    video: false 
                });
                
                statusVoz.innerText = "🎙️ Conectando tu voz con la sala...";
                btnMicrofono.innerText = "🔇 Mutear Micrófono";
                btnMicrofono.classList.add('mutear');

                // Forzar configuración limpia de PeerJS para evitar bloqueos de cortafuegos en PC
                miPeer = new Peer(undefined, {
                    config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } 
                });

                miPeer.on('open', (peerId) => {
                    statusVoz.innerText = `✅ En línea como: ${miNombre}`;
                    agregarBurbujaUsuario(miPeer.id, `${miNombre} (Tú)`);
                    
                    // Avisar a la sala que entramos
                    socket.emit('join-voice', { peerId: peerId, nombre: miNombre });
                });

                // Escuchar llamadas entrantes automáticas (Muy importante para la PC)
                miPeer.on('call', (llamada) => {
                    llamada.answer(miStreamLocal); 
                    llamada.on('stream', (streamRemoto) => {
                        reproducirAudioEntrante(streamRemoto, llamada.peer);
                    });
                });

                // Manejo de errores de conexión en PC
                miPeer.on('error', (err) => {
                    console.error("Error en PeerJS:", err);
                    if(err.type === 'peer-unavailable') {
                        statusVoz.innerText = "⚠️ Un usuario se desconectó abruptamente.";
                    }
                });

            } catch (error) {
                console.error("Error accediendo al micrófono:", error);
                statusVoz.innerText = "❌ Error: Activa los permisos de micrófono en tu navegador.";
            }
        } else {
            const audioTrack = miStreamLocal.getAudioTracks()[0];
            if (audioTrack.enabled) {
                audioTrack.enabled = false;
                btnMicrofono.innerText = "🎙️ Activar Micrófono";
                btnMicrofono.classList.remove('mutear');
                statusVoz.innerText = "🔇 Tu micrófono está silenciado.";
            } else {
                audioTrack.enabled = true;
                btnMicrofono.innerText = "🔇 Mutear Micrófono";
                btnMicrofono.classList.add('mutear');
                statusVoz.innerText = "🗣️ Hablando en vivo...";
            }
        }
    });

    // 📡 ESCUCHAS DE COORDINACIÓN SÍNCRONA

    socket.on('user-joined-voice', (data) => {
        if (miPeer && miStreamLocal && data.peerId !== miPeer.id) {
            agregarBurbujaUsuario(data.peerId, data.nombre);
            // Responder inmediatamente para romper la asimetría PC/Móvil
            socket.emit('reply-voice', { peerId: miPeer.id, nombre: miNombre });
            conectarAPeer(data.peerId);
        }
    });

    socket.on('user-replied-voice', (data) => {
        if (miPeer && miStreamLocal && data.peerId !== miPeer.id) {
            agregarBurbujaUsuario(data.peerId, data.nombre);
            conectarAPeer(data.peerId);
        }
    });

    function conectarAPeer(remotePeerId) {
        if (!miPeer || miPeer.destroyed) return;
        
        const llamada = miPeer.call(remotePeerId, miStreamLocal);
        if (llamada) {
            llamada.on('stream', (streamRemoto) => {
                reproducirAudioEntrante(streamRemoto, remotePeerId);
            });
        }
    }

    // 🛠️ RENDERIZADO VISUAL Y AUDIO
    function agregarBurbujaUsuario(id, nombre) {
        if (document.getElementById(`user-${id}`)) return;
        
        const burbuja = document.createElement('div');
        burbuja.className = 'usuario-burbuja';
        burbuja.id = `user-${id}`;
        burbuja.innerHTML = `<span class="status-dot"></span> ${nombre}`;
        usuariosLista.appendChild(burbuja);
    }

    function reproducirAudioEntrante(stream, peerId) {
        let elAudio = document.getElementById(`audio-${peerId}`);
        if (!elAudio) {
            elAudio = document.createElement('audio');
            elAudio.id = `audio-${peerId}`;
            audiosOcultos.appendChild(elAudio);
        }
        
        elAudio.srcObject = stream;
        elAudio.autoplay = true;
        elAudio.playsInline = true; 
        
        // Ejecución explícita para obligar a la CPU a reproducir el flujo de audio
        const playPromise = elAudio.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => {
                console.log("El navegador web bloqueó el autoplay. Creando activación por interacción.");
                // Si el navegador de la PC lo bloquea, dejamos que se active al primer clic que dé en la pantalla
                document.body.addEventListener('click', () => {
                    elAudio.play();
                }, { once: true });
            });
        }
    }
</script>
</body>
</html>
