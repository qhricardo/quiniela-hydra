<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela360 | Sala en Vivo estilo YouTube</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 15px; 
            background-color: #0f0f0f; 
            color: #ffffff;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Encabezado con botón regresar */
        .header-sala {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
        }
        .btn-regresar {
            padding: 8px 16px;
            background-color: #272727;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 18px;
            font-size: 14px;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-regresar:hover { background-color: #3f3f3f; }

        /* Estructura Principal estilo YouTube (Columnas) */
        .main-layout {
            display: flex;
            gap: 20px;
            flex-grow: 1;
            height: calc(100vh - 70px);
            min-height: 0;
        }

        /* COLUMNA IZQUIERDA: TV Y MICRÓFONO */
        .left-column {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 0;
        }
        .tv-wrapper { 
            width: 100%; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            aspect-ratio: 16 / 9;
        }
        .tv-wrapper iframe { width: 100%; height: 100%; border: none; }

        .audio-controls {
            background: #212121;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
        }
        .btn-mic { 
            background-color: #cc0000; 
            color: white; 
            border: none; 
            padding: 12px 35px; 
            font-size: 16px; 
            border-radius: 24px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .btn-mic:hover { background-color: #990000; }
        .btn-mic.mutear { background-color: #28a745; }
        .btn-mic.mutear:hover { background-color: #218838; }
        #status-voz { margin-top: 8px; font-size: 13px; color: #aaa; }

        .usuarios-seccion {
            background: #212121;
            padding: 15px;
            border-radius: 12px;
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #333;
        }
        .usuarios-lista { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .usuario-burbuja { 
            background: #333; padding: 6px 14px; border-radius: 15px; 
            display: flex; align-items: center; gap: 6px; font-size: 14px; 
            border: 1px solid #444;
        }
        .status-dot { width: 8px; height: 8px; background-color: #28a745; border-radius: 50%; }

        /* COLUMNA DERECHA: CHAT EN VIVO (ESTILO YOUTUBE) */
        .right-column {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            background: #1f1f1f;
            border: 1px solid #333;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #333;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #chat-status { font-size: 11px; padding: 4px 8px; border-radius: 10px; background: #333; color: #aaa; }
        
        #chat-messages {
            flex-grow: 1;
            padding: 15px;
            margin: 0;
            list-style: none;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #chat-messages li {
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }
        #chat-messages .user-name { color: #aaaaaa; font-weight: bold; margin-right: 8px; }
        #chat-messages .system-msg { color: #28a745; font-style: italic; font-size: 13px; }
        
        #chat-form {
            padding: 10px;
            border-top: 1px solid #333;
            display: flex;
            gap: 5px;
            background: #181818;
        }
        #chat-input {
            flex-grow: 1;
            background: #2c2c2c;
            border: 1px solid #444;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        #chat-input:focus { border-color: #cc0000; }
        #chat-form button {
            background: #cc0000;
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #chat-form button:hover { background-color: #990000; }

        /* Barra de scroll estilizada oscura */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        /* Responsivo para móviles */
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; height: auto; }
            .right-column { max-width: 100%; height: 350px; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

<div class="header-sala">
    <h2 style="margin:0; font-size: 20px; letter-spacing: 0.5px;">Quiniela360 Live</h2>
    <a href="index.html" class="btn-regresar">⬅️ Volver</a>
</div>

<div class="main-layout">
    
    <div class="left-column">
        <div class="tv-wrapper">
            <iframe src="live.html" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="audio-controls">
            <button id="btn-microfono" class="btn-mic">🎙️ Unirse al Canal de Voz</button>
            <div id="status-voz">Voz desconectada. Presiona el botón para hablar con el grupo.</div>
        </div>

        <div class="usuarios-seccion">
            <h4 style="margin:0; color: #aaa;">🎙️ En el canal de voz:</h4>
            <div class="usuarios-lista" id="usuarios-lista"></div>
        </div>
    </div>

    <div class="right-column">
        <div class="chat-header">
            <span>💬 Chat en vivo</span>
            <span id="chat-status">Conectando...</span>
        </div>
        <ul id="chat-messages"></ul>
        <form id="chat-form">
            <input id="chat-input" placeholder="Enviar un mensaje..." autocomplete="off" required />
            <button type="submit">Enviar</button>
        </form>
    </div>

</div>

<div id="audios-ocultos" style="display:none;"></div>

<script>
    const URL_CHAT = "https://quiniela-hydra-1.onrender.com"; 
    const socket = io(URL_CHAT);
    
    const btnMicrofono = document.getElementById('btn-microfono');
    const statusVoz = document.getElementById('status-voz');
    const usuariosLista = document.getElementById('usuarios-lista');
    const audiosOcultos = document.getElementById('audios-ocultos');
    const chatStatus = document.getElementById('chat-status');
    
    // Elementos del Chat
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    let miStreamLocal = null;
    let miPeer = null;
    const miNombre = "Usuario_" + Math.floor(Math.random() * 900 + 100);

    // Monitor visual del estado del Servidor Backend
    socket.on('connect', () => {
        chatStatus.innerText = "En línea";
        chatStatus.style.background = "#28a745";
        chatStatus.style.color = "#fff";
    });

    socket.on('disconnect', () => {
        chatStatus.innerText = "Desconectado";
        chatStatus.style.background = "#cc0000";
        chatStatus.style.color = "#fff";
    });

    // 💬 LÓGICA DEL CHAT EN VIVO
    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (chatInput.value.trim()) {
            socket.emit('chat message', {
                user: miNombre,
                text: chatInput.value
            });
            chatInput.value = '';
        }
    });

    socket.on('chat message', (data) => {
        const item = document.createElement('li');
        item.innerHTML = `<span class="user-name">${data.user}:</span><span>${data.text}</span>`;
        chatMessages.appendChild(item);
        chatMessages.scrollTop = chatMessages.scrollHeight; 
    });


    // 🎙️ LÓGICA DE VOZ (WEBRTC)
    btnMicrofono.addEventListener('click', async () => {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
            const ctx = new AudioContextClass();
            if (ctx.state === 'suspended') ctx.resume();
        }

        if (!miStreamLocal) {
            try {
                miStreamLocal = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }, 
                    video: false 
                });
                
                statusVoz.innerText = "🎙️ Conectando tu voz con la sala...";
                btnMicrofono.innerText = "🔇 Silenciar mi Micrófono";
                btnMicrofono.classList.add('mutear');

                // Múltiples servidores STUN de Google para saltar firewalls de operadoras móviles
                miPeer = new Peer(undefined, {
                    config: { 
                        'iceServers': [
                            { 'urls': 'stun:stun.l.google.com:19302' },
                            { 'urls': 'stun:stun1.l.google.com:19302' },
                            { 'urls': 'stun:stun2.l.google.com:19302' }
                        ] 
                    }
                });

                miPeer.on('open', (peerId) => {
                    statusVoz.innerText = `✅ Hablando como: ${miNombre}`;
                    agregarBurbujaUsuario(miPeer.id, `${miNombre} (Tú)`);
                    socket.emit('join-voice', { peerId: peerId, nombre: miNombre });
                });

                miPeer.on('call', (llamada) => {
                    llamada.answer(miStreamLocal); 
                    llamada.on('stream', (streamRemoto) => {
                        reproducirAudioEntrante(streamRemoto, llamada.peer);
                    });
                });

            } catch (error) {
                console.error(error);
                statusVoz.innerText = "❌ Error: Activa los permisos de micrófono.";
            }
        } else {
            const audioTrack = miStreamLocal.getAudioTracks()[0];
            if (audioTrack.enabled) {
                audioTrack.enabled = false;
                btnMicrofono.innerText = "🎙️ Hablar en el Canal";
                btnMicrofono.classList.remove('mutear');
                statusVoz.innerText = "🔇 Tu micrófono está silenciado.";
            } else {
                audioTrack.enabled = true;
                btnMicrofono.innerText = "🔇 Silenciar mi Micrófono";
                btnMicrofono.classList.add('mutear');
                statusVoz.innerText = "🗣️ Hablando en vivo...";
            }
        }
    });

    // Eventos síncronos P2P corregidos con delays protectores
    socket.on('user-joined-voice', (data) => {
        if (miPeer && miStreamLocal && data.peerId !== miPeer.id) {
            agregarBurbujaUsuario(data.peerId, data.nombre);
            socket.emit('reply-voice', { peerId: miPeer.id, nombre: miNombre });
            setTimeout(() => { conectarAPeer(data.peerId); }, 600);
        }
    });

    socket.on('user-replied-voice', (data) => {
        if (miPeer && miStreamLocal && data.peerId !== miPeer.id) {
            agregarBurbujaUsuario(data.peerId, data.nombre);
            setTimeout(() => { conectarAPeer(data.peerId); }, 600);
        }
    });

    // Eliminar burbuja de la interfaz cuando un usuario refresca o cierra pestaña
    socket.on('user-left-voice', (peerId) => {
        const burbuja = document.getElementById(`user-${peerId}`);
        if (burbuja) burbuja.remove();
        const audio = document.getElementById(`audio-${peerId}`);
        if (audio) audio.remove();
    });

    function conectarAPeer(remotePeerId) {
        if (!miPeer || miPeer.destroyed) return;
        const llamada = miPeer.call(remotePeerId, miStreamLocal);
        if (llamada) {
            llamada.on('stream', (streamRemoto) => {
                reproducirAudioEntrante(streamRemoto, remotePeerId);
            });
        }
    }

    function agregarBurbujaUsuario(id, nombre) {
        if (document.getElementById(`user-${id}`)) return;
        const burbuja = document.createElement('div');
        burbuja.className = 'usuario-burbuja';
        burbuja.id = `user-${id}`;
        burbuja.innerHTML = `<span class="status-dot"></span> ${nombre}`;
        usuariosLista.appendChild(burbuja);
    }

    function reproducirAudioEntrante(stream, peerId) {
        let elAudio = document.getElementById(`audio-${peerId}`);
        if (!elAudio) {
            elAudio = document.createElement('audio');
            elAudio.id = `audio-${peerId}`;
            audiosOcultos.appendChild(elAudio);
        }
        elAudio.srcObject = stream;
        elAudio.autoplay = true;
        elAudio.playsInline = true; 
        
        elAudio.play().catch(error => {
            document.body.addEventListener('click', () => { elAudio.play(); }, { once: true });
        });
    }
</script>
</body>
</html>
