<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiniela 360 - Login</title>
  <style>
  .pantalla-login{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .caja{
    width:100%;
    max-width:360px;
    text-align:center;
  }
  .caja .marca{
    font-family:var(--font-display);
    font-size:20px;
    margin-bottom:6px;
  }
  .caja .marca b{color:var(--oro);}
  .caja h1{
    font-size:22px;
    margin:18px 0 8px;
  }
  .caja p.sub{
    color:var(--texto-sec);
    font-size:14px;
    margin:0 0 28px;
  }
  #btn-google{
    background:#fff;
    color:#1f1f1f;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }
  #btn-google img{width:18px;height:18px;}
  .aviso-referido{
    margin-top:16px;
    font-size:12px;
    color:var(--verde-300);
    background:rgba(0,168,107,.1);
    border:1px solid rgba(0,168,107,.3);
    padding:8px 12px;
    border-radius:var(--radius-sm);
  }
  .legal-mini{
    margin-top:28px;
    font-size:11px;
    color:var(--texto-tenue);
  }
  #estado-carga{display:none;color:var(--texto-sec);font-size:13px;margin-top:14px;}
</style>
</head>
<body>

<div class="pantalla-login">
  <div class="caja">
    <div class="marca">Quiniela <b>360</b></div>
    <h1>Bienvenido de vuelta</h1>
    <p class="sub">Todos los partidos de la Liga Mx en Zona FanFest.</p>

    <button id="btn-google" class="btn btn-bloque">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="">
      Entrar con Google
    </button>

    <p id="estado-carga">Entrando…</p>
    <p id="aviso-referido" class="aviso-referido" hidden>🎁 Entras invitado por un amigo — le sumará un crédito cuando te registres.</p>

    <p class="legal-mini">Al continuar aceptas que Quiniela360 es un juego entre amigos y que la compra de créditos es opcional.</p>
  </div>
</div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <script>
    const db = firebase.firestore();
    const urlParams = new URLSearchParams(window.location.search);
    const referrerId = urlParams.get("ref");

    // ─────────── LOGIN GOOGLE ───────────
    document.getElementById('google-login').addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        const result = await firebase.auth().signInWithPopup(provider);
        const user = result.user;
        const userRef = db.collection('users').doc(user.uid);
        const userDoc = await userRef.get();

        if (!userDoc.exists) {
          await userRef.set({
            uid: user.uid,
            name: user.displayName || "Sin nombre",
            email: user.email || "",
            photoURL: user.photoURL || "",
            creditos: 0,
            invitadoPor: referrerId || null,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          if (referrerId) {
            const refUser = db.collection('users').doc(referrerId);
            await db.runTransaction(async (transaction) => {
              const refDoc = await transaction.get(refUser);
              if (!refDoc.exists) return;
              const currentCredits = refDoc.data().creditos || 0;
              transaction.update(refUser, { creditos: currentCredits + 1 });
            }).catch((err) => console.error("❌ Error en transacción:", err));
          }
        }
        window.location.href = "interfaz.html";
      } catch (error) {
        console.error("❌ Error en login con Google:", error);
        alert("Error al iniciar sesión: " + error.message);
      }
    });

    
  </script>
</body>
</html>
