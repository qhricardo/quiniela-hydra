<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiniela 360 - Login</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-image: url('https://images.unsplash.com/photo-1569337042150-c21c85b80a10?q=80&w=1540&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      margin: 0;
      color: #fff;
    }

    header {
      text-align: center;
      background: rgba(0, 104, 71, 0.95);
      padding: 15px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 28px;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    header img {
      width: 45px;
    }

    /* LOGIN BOX RESPONSIVO */
    .login-container {
      background: rgba(255,255,255,0.95);
      color: #333;
      margin: 40px auto;
      padding: 2rem;
      border-radius: 10px;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      color: #FFF;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
    }

    .login-container h2 {
      color: #006847;
      text-shadow: none;
      margin-top: 0;
    }

    button, #google-login {
      width: 100%;
      padding: 12px;
      background: #006847;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    button:hover, #google-login:hover {
      background: #004d33;
      transform: scale(1.03);
    }

    /* Secciones de Contenido e Instrucciones */
    .content-section {
      width: 90%;
      max-width: 600px;
      margin: 30px auto;
      text-align: center;
    }

    .img-responsive {
      width: 100%;
      max-width: 500px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* ───────────── Noticias ───────────── */
    #noticias {
      width: 90%;
      max-width: 800px;
      margin: 20px auto;
      background: rgba(0,0,0,0.75);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      box-sizing: border-box;
    }

    #noticias div {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
    }

    #noticias h3 {
      color: #00ff99;
      margin: 0 0 10px;
      font-size: 18px;
    }

    #noticias a {
      color: #ffd700;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.85);
      color: #ccc;
      margin-top: 40px;
      font-size: 14px;
    }

    /* Ajustes para pantallas pequeñas */
    @media (max-width: 480px) {
      header h1 {
        font-size: 24px;
      }
      .login-container {
        padding: 1.5rem;
      }
      #noticias h3 {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Quiniela 360 <img src="img/hidra.png" alt="logo"></h1>
  </header>

  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <button id="google-login" style="background-color:#4285F4; display:flex; align-items:center; justify-content:center; gap:10px;">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" height="20" alt="Google">
      Entrar con Google
    </button>
  </div>

  <div class="content-section">
    <h2>📋 INSTRUCCIONES</h2>
    <img src="img/instruccion.png" alt="Instrucciones" class="img-responsive">
  </div>
  
  <h2 style="text-align: center; margin-top: 40px;">📰 Últimas Noticias de Fútbol</h2>
  <div id="noticias">Cargando noticias...</div>

  <footer>© 2025 Quiniela360 - Todos los derechos reservados</footer>

  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <script>
    const db = firebase.firestore();
    const urlParams = new URLSearchParams(window.location.search);
    const referrerId = urlParams.get("ref");

    // ─────────── LOGIN GOOGLE ───────────
    document.getElementById('google-login').addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();

      try {
        const result = await firebase.auth().signInWithPopup(provider);
        const user = result.user;

        const userRef = db.collection('users').doc(user.uid);
        const userDoc = await userRef.get();

        if (!userDoc.exists) {
          console.log("🆕 Usuario nuevo detectado");
          await userRef.set({
            uid: user.uid,
            name: user.displayName || "Sin nombre",
            email: user.email || "",
            photoURL: user.photoURL || "",
            creditos: 1,
            invitadoPor: referrerId || null,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          if (referrerId) {
            console.log("🎯 Referrer detectado:", referrerId);
            const refUser = db.collection('users').doc(referrerId);

            await db.runTransaction(async (transaction) => {
              const refDoc = await transaction.get(refUser);
              if (!refDoc.exists) {
                console.warn("⚠️ El referente no existe:", referrerId);
                return;
              }
              const currentCredits = refDoc.data().creditos || 0;
              const newCredits = currentCredits + 1;
              transaction.update(refUser, { creditos: newCredits });
              console.log(`✅ Créditos actualizados para ${referrerId}: ${currentCredits} → ${newCredits}`);
            }).catch((err) => {
              console.error("❌ Error en transacción:", err);
            });
          }
        } else {
          console.log("👤 Usuario existente, no se suman créditos.");
        }

        window.location.href = "interfaz.html";

      } catch (error) {
        console.error("❌ Error en login con Google:", error);
        alert("Error al iniciar sesión: " + error.message);
      }
    });

    // ─────────── Noticias Automáticas ───────────
    async function cargarNoticias() {
      const rssUrl = 'https://www.espn.com.mx/espn/rss/futbol/mexico';
      try {
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
        const data = await res.json();
        const parser = new DOMParser();
        const xml = parser.parseFromString(data.contents, "text/xml");

        let html = "";
        xml.querySelectorAll("item").forEach((item, i) => {
          if (i >= 5) return; 
          const title = item.querySelector("title")?.textContent || "";
          const link = item.querySelector("link")?.textContent || "#";
          const description = item.querySelector("description")?.textContent || "";

          let imgTag = "";
          const imgMatch = description.match(/<img.*?src="(.*?)"/);
          if (imgMatch) imgTag = `<img src="${imgMatch[1]}" alt="${title}" style="width:100%; max-width:300px; border-radius:5px; margin-top:10px; display:block;">`;

          html += `
            <div style="margin-bottom:15px;">
              <h3>${title}</h3>
              ${imgTag}
              <p style="margin-top:10px;"><a href="${link}" target="_blank">Ver noticia completa ➔</a></p>
            </div>
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.15);">`;
        });

        document.getElementById("noticias").innerHTML = html || "<p>No hay noticias disponibles.</p>";
      } catch (err) {
        console.error("Error cargando noticias:", err);
        document.getElementById("noticias").innerHTML = "<p>No se pudieron cargar noticias.</p>";
      }
    }
    
    cargarNoticias();
  </script>
</body>
</html>
