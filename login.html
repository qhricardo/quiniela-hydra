<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiniela 360 - Login</title>
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f4f4f4; margin: 0; }
    .login-container { background: white; margin: 50px auto; padding: 2rem; border-radius: 10px; width: 90%; max-width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    h2 { color: #006847; text-align: center; }
    input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; color: white; font-size: 16px; margin-bottom: 10px; transition: 0.3s; }
    #btn-whatsapp { background: #25D366; }
    #google-login { background-color: #4285F4; display: flex; align-items: center; justify-content: center; gap: 10px; }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    
    <input type="tel" id="user-phone" placeholder="Celular (ej: 5512345678)">
    <button id="btn-whatsapp" onclick="prepararLink()">Generar enlace de acceso</button>
    
    <!-- Aquí aparecerá el botón seguro -->
    <div id="login-message" style="margin-top:15px; text-align:center;"></div>

    <div style="text-align: center; margin: 15px 0; color: #888;">o</div>

    <button id="google-login">Entrar con Google</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>

  <script>
    function prepararLink() {
      const phone = document.getElementById('user-phone').value;
      const msgDiv = document.getElementById('login-message');
      
      if (phone.length < 10) { 
        alert("Ingresa un número válido de 10 dígitos"); 
        return; 
      }

      // En lugar de redireccionar, creamos un enlace seguro
      const magicLink = `https://quiniela360.com/auth/verify?token=XYZ123`;
      const whatsappUrl = `https://wa.me/${phone}?text=Tu enlace de acceso seguro: ${encodeURIComponent(magicLink)}`;
      
      // Creamos un botón HTML seguro en lugar de usar window.open o redirección
      msgDiv.innerHTML = `
        <a href="${whatsappUrl}" 
           target="_blank" 
           rel="noopener noreferrer" 
           style="background:#25D366; color:white; padding:12px; border-radius:6px; text-decoration:none; display:block; font-weight:bold;">
           Enviar mi enlace por WhatsApp
        </a>`;
    }

    // Google Login original
    document.getElementById('google-login').addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await firebase.auth().signInWithPopup(provider);
        window.location.href = "interfaz.html";
      } catch (e) { alert("Error: " + e.message); }
    });
  </script>
</body>
</html>
