<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiniela 360 - Login</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-image: url('https://images.unsplash.com/photo-1569337042150-c21c85b80a10?q=80&w=1540&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      margin: 0;
      color: #fff;
    }

    header {
      text-align: center;
      background: rgba(0, 104, 71, 0.95);
      padding: 15px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 28px;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    header img {
      width: 45px;
    }

    /* LOGIN BOX RESPONSIVO */
    .login-container {
      background: rgba(255,255,255,0.95);
      color: #333;
      margin: 40px auto;
      padding: 2rem;
      border-radius: 10px;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      color: #FFF;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
    }

    .login-container h2 {
      color: #006847;
      text-shadow: none;
      margin-top: 0;
    }

    button, #google-login {
      width: 100%;
      padding: 12px;
      background: #006847;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    button:hover, #google-login:hover {
      background: #004d33;
      transform: scale(1.03);
    }

    /* Secciones de Contenido e Instrucciones */
    .content-section {
      width: 90%;
      max-width: 600px;
      margin: 30px auto;
      text-align: center;
    }

    .img-responsive {
      width: 100%;
      max-width: 500px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* ───────────── Noticias ───────────── */
    #noticias {
      width: 90%;
      max-width: 800px;
      margin: 20px auto;
      background: rgba(0,0,0,0.75);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      box-sizing: border-box;
    }

    #noticias div {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
    }

    #noticias h3 {
      color: #00ff99;
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.4;
    }

    #noticias p {
      color: #ddd;
      font-size: 14px;
      line-height: 1.5;
      margin: 10px 0;
    }

    #noticias a {
      color: #ffd700;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.85);
      color: #ccc;
      margin-top: 40px;
      font-size: 14px;
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 24px;
      }
      .login-container {
        padding: 1.5rem;
      }
      #noticias h3 {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Quiniela 360 <img src="img/hidra.png" alt="logo"></h1>
  </header>

  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <button id="google-login" style="background-color:#4285F4; display:flex; align-items:center; justify-content:center; gap:10px;">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" height="20" alt="Google">
      Entrar con Google
    </button>
  </div>

  <div class="content-section">
    <h2>📋 INSTRUCCIONES</h2>
    <img src="img/instruccion.png" alt="Instrucciones" class="img-responsive">
  </div>
  
  <h2 style="text-align: center; margin-top: 40px;">📰 Últimas Noticias de Fútbol MX</h2>
  <div id="noticias">Cargando noticias de la Liga MX...</div>

  <footer>© 2025 Quiniela360 - Todos los derechos reservados</footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <script>
    const db = firebase.firestore();
    const urlParams = new URLSearchParams(window.location.search);
    const referrerId = urlParams.get("ref");

    // ─────────── LOGIN GOOGLE ───────────
    document.getElementById('google-login').addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();

      try {
        const result = await firebase.auth().signInWithPopup(provider);
        const user = result.user;

        const userRef = db.collection('users').doc(user.uid);
        const userDoc = await userRef.get();

        if (!userDoc.exists) {
          console.log("🆕 Usuario nuevo detectado");
          await userRef.set({
            uid: user.uid,
            name: user.displayName || "Sin nombre",
            email: user.email || "",
            photoURL: user.photoURL || "",
            creditos: 1,
            invitadoPor: referrerId || null,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          if (referrerId) {
            const refUser = db.collection('users').doc(referrerId);
            await db.runTransaction(async (transaction) => {
              const refDoc = await transaction.get(refUser);
              if (!refDoc.exists) return;
              const currentCredits = refDoc.data().creditos || 0;
              transaction.update(refUser, { creditos: currentCredits + 1 });
            }).catch((err) => console.error("❌ Error en transacción:", err));
          }
        }
        window.location.href = "interfaz.html";
      } catch (error) {
        console.error("❌ Error en login con Google:", error);
        alert("Error al iniciar sesión: " + error.message);
      }
    });

    // ─────────── API DE NOTICIAS ESTABLE (LIGA MX) ───────────
    async function cargarNoticias() {
      try {
        // Usamos la API pública y directa de un-official feed reader que convierte a JSON sin usar Proxies caídos
        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.mediotiempo.com%2Frss%2Ffutbol%2Fliga-mx');
        const data = await response.json();

        if (data.status !== 'ok' || !data.items || data.items.length === 0) {
          throw new Error("Estructura de respuesta inválida");
        }

        let html = "";
        // Tomamos los primeros 5 artículos devueltos por la API
        data.items.slice(0, 5).forEach((item) => {
          const title = item.title || "";
          const link = item.link || "#";
          
          // Limpieza de descripción de texto plano
          let description = item.description || "";
          description = description.replace(/<[^>]*>/g, ''); // Remueve cualquier HTML interno
          if (description.length > 140) {
            description = description.substring(0, 140) + "...";
          }

          // Si el feed incluye una imagen directa en los metadatos de la API, la añadimos de forma responsiva
          let imgTag = "";
          if (item.thumbnail) {
            imgTag = `<img src="${item.thumbnail}" style="width:100%; max-width:280px; border-radius:6px; margin: 10px 0; display:block;">`;
          }

          html += `
            <div style="margin-bottom:15px; text-align: left;">
              <h3>${title}</h3>
              ${imgTag}
              <p>${description}</p>
              <p style="margin-top:8px;"><a href="${link}" target="_blank">Leer noticia completa ➔</a></p>
            </div>
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.15); margin: 15px 0;">`;
        });

        document.getElementById("noticias").innerHTML = html;
      } catch (err) {
        console.error("Error cargando API de noticias primarias, usando respaldo:", err);
        // RESPALDO EN CASO DE INTERNET LENTO: Renderiza noticias frescas estáticas de la jornada actual para que la sección nunca se vea vacía
        document.getElementById("noticias").innerHTML = `
          <div style="margin-bottom:15px; text-align: left;">
            <h3>¡Se juega la nueva jornada de la Liga MX!</h3>
            <p>Los equipos buscan asegurar su lugar en la liguilla del fútbol mexicano. Revisa las tendencias de la semana para armar tu mejor pronóstico.</p>
            <p style="margin-top:8px;"><a href="https://www.mediotiempo.com/futbol/liga-mx" target="_blank">Ver tabla general e información completa ➔</a></p>
          </div>
          <hr style="border:0; border-top:1px solid rgba(255,255,255,0.15); margin: 15px 0;">
          <div style="margin-bottom:15px; text-align: left;">
            <h3>Movimientos en el mercado técnico y de jugadores</h3>
            <p>Los clubes mexicanos realizan ajustes en sus plantillas y estrategias para enfrentar los partidos más difíciles del torneo.</p>
            <p style="margin-top:8px;"><a href="https://www.mediotiempo.com/futbol/liga-mx" target="_blank">Revisar últimas altas y bajas ➔</a></p>
          </div>`;
      }
    }
    
    cargarNoticias();
  </script>
</body>
</html>
