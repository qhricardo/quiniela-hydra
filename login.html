<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiniela 360 - FanFest</title>
  <style>
    :root {
      --bg-dark: #0f172a; /* Azul muy oscuro */
      --accent-neon: #00f2ff; /* Azul eléctrico */
      --gold: #ffcc00; /* Oro */
      --white: #ffffff;
      --text-gray: #94a3b8;
    }

    body {
      margin: 0;
      background-color: var(--bg-dark);
      color: var(--white);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .pantalla-login {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    }

    .caja {
      width: 100%;
      max-width: 360px;
      text-align: center;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .marca { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
    .marca b { color: var(--gold); }
    
    h1 { font-size: 24px; margin: 15px 0; }
    .sub { color: var(--text-gray); margin-bottom: 30px; }

    #btn-google {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform 0.2s, background 0.3s;
    }

    #btn-google:hover { transform: scale(1.02); }
    #btn-google img { width: 20px; }

    .aviso-referido {
      margin-top: 20px;
      font-size: 13px;
      color: var(--accent-neon);
      background: rgba(0, 242, 255, 0.1);
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="pantalla-login">
  <div class="caja">
    <div class="marca">Quiniela <b>360</b></div>
    <h1>Zona FanFest Live</h1>
    <p class="sub">Inicia sesión para vivir la Liga MX.</p>

    <button id="btn-google">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
      Entrar con Google
    </button>

    <p id="estado-carga" style="display:none; margin-top:15px;">Conectando al estadio...</p>
    <p id="aviso-referido" class="aviso-referido" style="display:none;">🎁 ¡Entraste por invitación! Recibirás un crédito extra.</p>

    <p style="margin-top:30px; font-size:11px; color:#64748b;">Quiniela 360 | Juego entre amigos</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
  const db = firebase.firestore();
  const urlParams = new URLSearchParams(window.location.search);
  const referrerId = urlParams.get("ref");

  // Mostrar aviso si hay referido
  if (referrerId) document.getElementById('aviso-referido').style.display = 'block';

  document.getElementById('btn-google').addEventListener('click', async () => {
    const btn = document.getElementById('btn-google');
    const loader = document.getElementById('estado-carga');
    
    btn.disabled = true;
    loader.style.display = 'block';

    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      const result = await firebase.auth().signInWithPopup(provider);
      const user = result.user;
      const userRef = db.collection('users').doc(user.uid);
      const userDoc = await userRef.get();

      if (!userDoc.exists) {
        await userRef.set({
          uid: user.uid,
          name: user.displayName,
          email: user.email,
          creditos: referrerId ? 1 : 0, // Crédito inicial
          invitadoPor: referrerId || null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        if (referrerId) {
          const refUser = db.collection('users').doc(referrerId);
          await refUser.update({ creditos: firebase.firestore.FieldValue.increment(1) });
        }
      }
      window.location.href = "interfaz.html";
    } catch (error) {
      console.error(error);
      alert("Error al conectar: " + error.message);
      btn.disabled = false;
      loader.style.display = 'none';
    }
  });
</script>
</body>
</html>
