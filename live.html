<!DOCTYPE html>
<html>
<head>
    <script src="//cdn.jsdelivr.net/npm/@clappr/player@0.8/dist/clappr.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/@swarmcloud/hls/p2p-engine.min.js"></script>
    <style>
        body, html {margin: 0;padding: 0;width: 100%;height: 100%;overflow: hidden;background: #000;}
        #player {position: absolute;top: 0;left: 0;width: 100%;height: 100%;}
    </style>
</head>
<body>
<div id="player"></div>
<script>
    var playbackURL = "https://cxm2.futbolonlinehd.com:443/telemundo/mono.m3u8?token=3ef8ccbf12cca4a8e16d0cd006a958812e331790-69-1783728169-1783710169";
    var p2pConfig = { live: true, trackerZone: "us" }
    
    P2PEngineHls.tryRegisterServiceWorker(p2pConfig).then(() => {
        var player = new Clappr.Player({
            source: playbackURL,
            parentId: "#player",
            width: "100%",
            height: "100%",
            autoPlay: true,  // Activado
            mute: false,      // Necesario para autoplay en navegadores
            plugins: [],
            mediacontrol: {seekbar: "#D4ED31", buttons: "#FFFFFF"},
        });
        p2pConfig.hlsjsInstance = player.core.getCurrentPlayback()?._hls;
        var engine = new P2PEngineHls(p2pConfig);
    });
</script>
</body>
</html>
