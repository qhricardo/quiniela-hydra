<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiniela360 | Interfaz</title>
  <style>
    /* Estilos base */
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(145deg, #001f12 0%, #004d2a 100%); color: #fff; margin: 0; padding: 0; }
    header { background: linear-gradient(90deg, #007a33, #00c853); padding: 25px; text-align: center; border-radius: 0 0 25px 25px; }
    .card { background: rgba(255,255,255,0.08); border-radius: 18px; padding: 30px; width: 90%; max-width: 500px; margin: 30px auto; text-align: center; }
    button { background: #00ff99; color: #111; border: none; border-radius: 50px; padding: 12px 25px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
    #modalContent { background: #004d2a; width: 90%; max-width: 400px; margin: 20% auto; padding: 30px; border-radius: 20px; text-align: center; }
    .grupo-card { background: rgba(0,255,150,0.2); border: 1px solid #00ff99; padding: 20px; margin: 10px; border-radius: 15px; cursor: pointer; }
  </style>
</head>
<body>

  <header>
    <h2 id="usuario">Cargando...</h2>
    <div class="info">Créditos: <span id="creditos">0</span></div>
  </header>

  <div class="card">
    <h3>Crear Nuevo Grupo</h3>
    <input type="text" id="nombreGrupo" placeholder="Nombre del grupo">
    <input type="password" id="passwordGrupo" placeholder="Contraseña (opcional)">
    <br>
    <button onclick="crearGrupo()">Crear Grupo</button>
  </div>

  <h3 style="text-align: center;">Grupos Disponibles</h3>
  <div id="gruposContainer"></div>

  <div id="modal">
    <div id="modalContent">
      <h3 id="modalTitulo">Detalle del Grupo</h3>
      <div id="passwordDiv" style="display:none;">
        <input type="password" id="passwordInput" placeholder="Contraseña">
      </div>
      <button onclick="entrarAlGrupo()">Entrar al Grupo</button>
      <button onclick="document.getElementById('modal').style.display='none'">Cancelar</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC8itN53SkagtwJPqw6XSllsUP8w7-o7d8",
      authDomain: "quiniela-hydra.firebaseapp.com",
      projectId: "quiniela-hydra",
      storageBucket: "quiniela-hydra.firebasestorage.app",
      messagingSenderId: "329849216739",
      appId: "1:329849216739:web:83d23ff1424eb167172fd6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let usuarioActual = null;
    window.grupoSeleccionado = null;
    window.grupoPassword = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        await signInWithPopup(auth, new GoogleAuthProvider());
      } else {
        usuarioActual = user;
        document.getElementById("usuario").innerText = `Bienvenido, ${user.displayName}`;
        cargarGrupos();
      }
    });

    async function cargarGrupos() {
      const snap = await getDocs(collection(db, "grupos"));
      const cont = document.getElementById("gruposContainer");
      cont.innerHTML = "";
      snap.forEach(doc => {
        const data = doc.data();
        const div = document.createElement("div");
        div.className = "grupo-card";
        div.innerHTML = `<h3>${data.nombre}</h3>`;
        div.onclick = () => {
          window.grupoSeleccionado = doc.id;
          window.grupoPassword = data.password;
          document.getElementById("modalTitulo").innerText = data.nombre;
          document.getElementById("passwordDiv").style.display = data.password ? "block" : "none";
          document.getElementById("modal").style.display = "block";
        };
        cont.appendChild(div);
      });
    }

    window.crearGrupo = async () => {
      const nombre = document.getElementById("nombreGrupo").value;
      const pass = document.getElementById("passwordGrupo").value;
      await addDoc(collection(db, "grupos"), { nombre, password: pass, creador: usuarioActual.uid });
      location.reload();
    };

    window.entrarAlGrupo = async () => {
      const passIngresada = document.getElementById("passwordInput").value;
      if (window.grupoPassword && passIngresada !== window.grupoPassword) {
        return alert("Contraseña incorrecta");
      }
      
      await setDoc(doc(db, "grupos", window.grupoSeleccionado, "miembros", usuarioActual.uid), {
        nombre: usuarioActual.displayName
      });
      
      localStorage.setItem("grupoActivo", window.grupoSeleccionado);
      // Redirección forzada
      window.location.replace("index.html");
    };
  </script>
</body>
</html>
